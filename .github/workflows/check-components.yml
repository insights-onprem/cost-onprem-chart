# Check Components Workflow
#
# Monitors container images tagged as "latest" in values.yaml for updates.
# When changes are detected, updates component-updates.json and creates a PR
# to trigger the test suite. Does NOT modify values.yaml or Chart.yaml -
# version bumps are left to human reviewers.
#
# Modes:
#   - detect-updates (default): Check for changes, update JSON, create PR for testing
#   - list-versions: Report current digests and last modified dates
#
# Schedule: Every 4 hours
# Manual: Run via workflow_dispatch with mode selection

name: Check Components

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode'
        required: false
        default: 'detect-updates'
        type: choice
        options:
          - detect-updates
          - list-versions

permissions:
  contents: write
  pull-requests: write

jobs:
  check-components:
    name: Check Components
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore digest cache
        if: inputs.mode != 'list-versions'
        uses: actions/cache@v4
        with:
          path: .digest-cache
          key: component-digests-${{ github.run_id }}
          restore-keys: component-digests-

      - name: Check components
        id: check
        env:
          MODE: ${{ inputs.mode || 'detect-updates' }}
        run: ./scripts/qe/check-components.sh

      - name: Report versions
        if: steps.check.outputs.mode == 'list-versions'
        run: |
          echo "## Component Versions"
          echo ""
          echo "${{ steps.check.outputs.versions }}"

      # --- detect-updates mode: update JSON and create PR for testing ---

      - name: Create test PR
        id: create-pr
        if: steps.check.outputs.mode == 'detect-updates' && steps.check.outputs.has_updates == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="automated/component-test-$(date +%Y%m%d)"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Verify component-updates.json was modified
          if ! git diff --quiet HEAD -- component-updates.json; then
            echo "Changes detected in component-updates.json"
            
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git checkout -b "$BRANCH"
            git add component-updates.json
            git commit -m "chore: component updates detected - trigger test run

Updated components:
${{ steps.check.outputs.updates_summary }}"
            
            # Force push is safe for automated ephemeral branches
            git push -u origin "$BRANCH" --force
          else
            echo "No changes to component-updates.json, skipping"
            echo "pr_created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Build PR body
          cat > /tmp/pr-body.md <<EOF
          ## Component Updates Detected

          The following container images have new \`latest\` digests:

          ${{ steps.check.outputs.updates_summary }}

          ### What This PR Does

          - Updates \`component-updates.json\` with detected changes
          - Triggers the test suite to validate the new images
          - **Does NOT modify \`values.yaml\` or \`Chart.yaml\`**

          ### Reviewer Actions

          1. **Wait for tests** to complete
          2. **If tests pass**: Optionally bump versions in \`values.yaml\` if desired
          3. **If tests fail**: Investigate and coordinate with upstream
          4. **Close or merge** this PR once addressed

          > **Note**: This PR only tracks the change detection. Version bumps are intentionally left to human reviewers.

          ---
          *Generated by check-components workflow*
          EOF

          # Check for existing PR on this branch
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number -q '.[0].number')

          if [[ -n "$EXISTING" ]]; then
            gh pr edit "$EXISTING" --body-file /tmp/pr-body.md
            echo "Updated existing PR #$EXISTING"
            echo "pr_number=$EXISTING" >> "$GITHUB_OUTPUT"
          else
            PR_URL=$(gh pr create \
              --title "test: validate component updates ($(date +%Y-%m-%d))" \
              --body-file /tmp/pr-body.md \
              --label "component-update" \
              --label "automated" \
              --label "test-only")
            PR_NUM=$(echo "$PR_URL" | grep -oE '[0-9]+$')
            echo "Created PR #$PR_NUM"
            echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
          fi

      # --- Recommend test profile based on changed components ---

      - name: Recommend tests
        id: recommend
        if: steps.create-pr.outputs.pr_number
        env:
          BASE_BRANCH: main
        run: ./scripts/qe/recommend-tests.sh

      - name: Comment test recommendation
        if: steps.recommend.outputs.needs_deeper_testing == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pr_number }}
          PROFILE: ${{ steps.recommend.outputs.suggested_profile }}
          COMPONENT_TABLE: ${{ steps.recommend.outputs.component_table }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: ./scripts/qe/post-test-advisor-comment.sh
