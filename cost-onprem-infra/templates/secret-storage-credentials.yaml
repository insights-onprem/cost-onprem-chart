{{- $secretName := include "cost-mgmt.storage.secretName" . -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- if not $existingSecret }}
{{- /* Secret doesn't exist in target namespace, try to copy from source */ -}}
{{- $sourceSecret := lookup "v1" "Secret" .Values.storage.credentialsSecret.namespace .Values.storage.credentialsSecret.name -}}
{{- if $sourceSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cost-mgmt.labels" . | nindent 4 }}
type: Opaque
data:
  access-key: {{ index $sourceSecret.data .Values.storage.credentialsSecret.accessKeyKey }}
  secret-key: {{ index $sourceSecret.data .Values.storage.credentialsSecret.secretKeyKey }}
{{- else }}
{{- fail (printf "Storage credentials secret '%s' not found in namespace '%s' and source secret '%s/%s' not found. Please create the storage credentials secret or ensure ODF/NooBaa is deployed." $secretName .Release.Namespace .Values.storage.credentialsSecret.namespace .Values.storage.credentialsSecret.name) }}
{{- end }}
{{- end }}
