apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "cost-onprem.fullname" . }}-migration
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cost-onprem.koku.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "cost-onprem.koku.labels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "cost-onprem.koku.serviceAccountName" . }}
      securityContext:
        {{- include "cost-onprem.securityContext.pod" . | nindent 8 }}
      containers:
      - name: migration
        image: {{ include "cost-onprem.koku.image" . }}
        imagePullPolicy: {{ .Values.costManagement.api.image.pullPolicy | default "IfNotPresent" }}
        securityContext:
          {{- include "cost-onprem.securityContext.container" . | nindent 10 }}
        command:
        - bash
        - -c
        - |
          set -e

          echo "=========================================="
          echo "Koku Django Migrations"
          echo "=========================================="
          echo "Timestamp: $(date)"
          echo "Pod: $(hostname)"
          echo ""

          echo "=== Environment Configuration ==="
          echo "Database Host: ${DATABASE_SERVICE_HOST}"
          echo "Database Port: ${DATABASE_SERVICE_PORT}"
          echo "Database Name: ${DATABASE_NAME}"
          echo "Database User: ${DATABASE_USER}"
          echo "Password Length: ${#DATABASE_PASSWORD} chars"
          echo ""

          echo "=== Testing Database Connectivity ==="
          echo "Attempting TCP connection to ${DATABASE_SERVICE_HOST}:${DATABASE_SERVICE_PORT}..."
          timeout 10 bash -c "cat < /dev/null > /dev/tcp/${DATABASE_SERVICE_HOST}/${DATABASE_SERVICE_PORT}" \
            && echo "TCP connection successful" \
            || { echo "TCP connection failed"; exit 1; }
          echo ""

          echo "=== Preparing Migration Environment ==="
          mkdir -p /tmp/prometheus
          cd /opt/koku/koku
          echo "Working directory: $(pwd)"
          echo ""

          echo "=== Running Django Migrations ==="
          python manage.py migrate --noinput
          migration_exit=$?
          echo ""

          if [ $migration_exit -eq 0 ]; then
            echo "=== Migration Summary ==="
            python manage.py showmigrations | head -20
            echo "..."
            echo ""

            echo "=== Verifying Database ==="
            python manage.py check --database default
            echo ""
          fi

          echo "=========================================="
          if [ $migration_exit -eq 0 ]; then
            echo "Migrations completed successfully!"
          else
            echo "Migrations failed with exit code: $migration_exit"
          fi
          echo "=========================================="

          exit $migration_exit
        env:
        - name: DATABASE_SERVICE_NAME
          value: "DATABASE"
        - name: DATABASE_SERVICE_HOST
          value: {{ include "cost-onprem.koku.database.host" . | quote }}
        - name: DATABASE_SERVICE_PORT
          value: {{ include "cost-onprem.koku.database.port" . | quote }}
        - name: DATABASE_ENGINE
          value: "postgresql"
        - name: DATABASE_NAME
          value: {{ include "cost-onprem.koku.database.dbname" . | quote }}
        - name: DATABASE_USER
          value: {{ include "cost-onprem.koku.database.user" . | quote }}
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "cost-onprem.koku.database.secretName" . }}
              key: koku-password
        - name: DJANGO_SECRET_KEY
          value: "migration-temp-key"
        - name: CLOWDER_ENABLED
          value: "False"
        - name: DEVELOPMENT
          value: "False"
        - name: PROMETHEUS_MULTIPROC_DIR
          value: "/tmp/prometheus"
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
      volumes:
      - name: tmp
        emptyDir: {}
