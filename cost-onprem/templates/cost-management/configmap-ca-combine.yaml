apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cost-onprem.fullname" . }}-ca-combine
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cost-onprem.labels" . | nindent 4 }}
    app.kubernetes.io/component: ca-trust
data:
  combine-ca.sh: |
    #!/bin/bash
    set -e

    echo "🔧 Combining CA certificates for Python SSL..."

    # Wait for the OpenShift service-CA operator to inject the CA bundle.
    # The ConfigMap is created with an empty data field and the annotation
    # service.beta.openshift.io/inject-cabundle=true.  The operator
    # populates it asynchronously, so the volume mount may be empty on
    # first boot.  Without this CA the gRPC TLS handshake to the Kessel
    # Inventory API will fail.
    MAX_WAIT=60
    WAITED=0
    while [ ! -f /ca-source/service-ca.crt ] || [ ! -s /ca-source/service-ca.crt ]; do
        if [ "$WAITED" -ge "$MAX_WAIT" ]; then
            echo "⚠️ Timed out waiting for service-CA injection (${MAX_WAIT}s). Proceeding without it."
            break
        fi
        echo "⏳ Waiting for service-CA ConfigMap injection... (${WAITED}s/${MAX_WAIT}s)"
        sleep 2
        WAITED=$((WAITED + 2))
    done

    # Start with system CA bundle
    if [ -f /etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem ]; then
        echo "📋 Adding system CA bundle..."
        cat /etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem > /tmp/combined-ca.crt
    elif [ -f /etc/ssl/certs/ca-bundle.crt ]; then
        echo "📋 Adding system CA bundle..."
        cat /etc/ssl/certs/ca-bundle.crt > /tmp/combined-ca.crt
    elif [ -f /etc/ssl/certs/ca-certificates.crt ]; then
        echo "📋 Adding system CA certificates..."
        cat /etc/ssl/certs/ca-certificates.crt > /tmp/combined-ca.crt
    else
        echo "⚠️ No system CA bundle found, starting with empty bundle"
        touch /tmp/combined-ca.crt
    fi

    echo "" >> /tmp/combined-ca.crt

    # Add OpenShift cluster root CA (Kubernetes service account CA)
    if [ -f /var/run/secrets/kubernetes.io/serviceaccount/ca.crt ]; then
        echo "📋 Adding OpenShift cluster root CA..."
        cat /var/run/secrets/kubernetes.io/serviceaccount/ca.crt >> /tmp/combined-ca.crt
        echo "" >> /tmp/combined-ca.crt
    fi

    # Add OpenShift Service CA (signs *.svc certificates for in-cluster TLS)
    if [ -f /ca-source/service-ca.crt ] && [ -s /ca-source/service-ca.crt ]; then
        echo "📋 Adding OpenShift Service CA..."
        cat /ca-source/service-ca.crt >> /tmp/combined-ca.crt
        echo "" >> /tmp/combined-ca.crt
    fi

    # Copy to shared volume
    cp /tmp/combined-ca.crt /ca-output/ca-bundle.crt

    echo "✅ Combined CA bundle created with $(grep -c 'BEGIN CERTIFICATE' /ca-output/ca-bundle.crt) certificates"
    echo "📄 CA bundle size: $(wc -c < /ca-output/ca-bundle.crt) bytes"

