apiVersion: v1
kind: Service
metadata:
  name: {{ include "cost-onprem.rbac.api.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cost-onprem.labels" . | nindent 4 }}
    app.kubernetes.io/component: rbac-api
spec:
  type: {{ .Values.rbac.service.type }}
  ports:
  - name: http
    port: {{ .Values.rbac.service.port }}
    targetPort: {{ .Values.rbac.api.port }}
    protocol: TCP
  selector:
    {{- include "cost-onprem.rbac.api.selectorLabels" . | nindent 4 }}
