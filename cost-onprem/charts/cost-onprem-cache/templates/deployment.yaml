apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cost-onprem-cache.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cost-onprem-cache.labels" . | nindent 4 }}
    app.kubernetes.io/component: cache
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "cost-onprem-cache.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: cache
  template:
    metadata:
      labels:
        {{- include "cost-onprem-cache.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: cache
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        {{- $fsGroup := include "cost-onprem-cache.fsGroup" . }}
        {{- if $fsGroup }}
        fsGroup: {{ $fsGroup }}
        {{- end }}
      containers:
        - name: valkey
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default (.Values.global.pullPolicy | default "IfNotPresent") }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
          ports:
            - name: valkey
              containerPort: {{ .Values.port }}
              protocol: TCP
          command:
            - valkey-server
          args:
            - --bind
            - "{{ .Values.bindAddress }}"
            - --port
            - "{{ .Values.port }}"
            - --protected-mode
            - "no"
            - --save
            - "900 1 300 10 60 10000"
            - --appendonly
            - "yes"
            - --appendfsync
            - "everysec"
            - --dir
            - "/data"
            - --maxmemory
            - "{{ .Values.maxMemory }}"
            - --maxmemory-policy
            - "{{ .Values.maxMemoryPolicy }}"
          livenessProbe:
            exec:
              command:
                - valkey-cli
                - ping
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
          readinessProbe:
            exec:
              command:
                - valkey-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: {{ .Values.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "cost-onprem-cache.fullname" . }}-data
