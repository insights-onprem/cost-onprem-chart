apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "cost-onprem-database.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cost-onprem-database.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  serviceName: {{ include "cost-onprem-database.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "cost-onprem-database.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        {{- include "cost-onprem-database.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: database
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgres
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.global.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: postgres
              containerPort: {{ .Values.port }}
              protocol: TCP
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "cost-onprem-database.secretName" . }}
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cost-onprem-database.secretName" . }}
                  key: postgres-password
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
            - name: ROS_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "cost-onprem-database.secretName" . }}
                  key: ros-user
            - name: ROS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cost-onprem-database.secretName" . }}
                  key: ros-password
            - name: KRUIZE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "cost-onprem-database.secretName" . }}
                  key: kruize-user
            - name: KRUIZE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cost-onprem-database.secretName" . }}
                  key: kruize-password
            - name: KOKU_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "cost-onprem-database.secretName" . }}
                  key: koku-user
            - name: KOKU_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cost-onprem-database.secretName" . }}
                  key: koku-password
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER"
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER"
            initialDelaySeconds: 5
            periodSeconds: {{ .Values.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: init-scripts
          configMap:
            name: {{ include "cost-onprem-database.fullname" . }}-init
  volumeClaimTemplates:
    - metadata:
        name: postgres-storage
      spec:
        accessModes: [ "ReadWriteOnce" ]
        volumeMode: {{ include "cost-onprem-database.volumeMode" . }}
        storageClassName: {{ include "cost-onprem-database.storageClass" . }}
        resources:
          requests:
            storage: {{ .Values.storage.size }}
