---
generators:
  - OCPGenerator:
      nodes:
        - node:
          node_name: ocp-missing_items
          cpu_cores: 100
          memory_gig: 100
          resource_id: 62962962
          namespaces:
            ocp_missing_items:
              pods:
                - pod:
                  pod_name: missing_top1
                  cpu_request: 30
                  mem_request_gig: 30
                  cpu_limit: 40
                  mem_limit_gig: 40
                  pod_seconds: 3600
                  cpu_usage:
                    full_period: 20
                  mem_usage_gig:
                    full_period: 20
                  labels: label_app:missing_top1
              volumes:
                - volume:
                  volume_name: pvc-volume_1
                  storage_class: gp2
                  volume_request_gig: 10
                  labels: label_volume:missing_top1
                  volume_claims:
                  - volume_claim:
                    volume_claim_name: data_missing_top1
                    pod_name: missing_top1
                    labels: label_volume:stor_missing_top1
                    capacity_gig: 10
                    volume_claim_usage_gig:
                      full_period: 5
            ocp_missing_items2:
              pods:
                - pod:
                  pod_name: missing_top2
                  cpu_request: 20
                  mem_request_gig: 20
                  cpu_limit: 30
                  mem_limit_gig: 20
                  pod_seconds: 3600
                  cpu_usage:
                    full_period: 10
                  mem_usage_gig:
                    full_period: 10
                  labels: label_app:missing_top2
              volumes:
                - volume:
                  volume_name: pvc-volume_2
                  storage_class: gp2
                  volume_request_gig: 50
                  labels: label_volume:missing_top2
                  volume_claims:
                    - volume_claim:
                      volume_claim_name: data_missing_top2
                      pod_name: missing_top2
                      labels: label_volume:stor_missing_top2
                      capacity_gig: 50
                      volume_claim_usage_gig:
                        full_period: 5
            ocp_missing_items3:
              pods:
                - pod:
                  pod_name: missing_non_top
                  cpu_request: 0.0001
                  mem_request_gig: 0.0001
                  cpu_limit: 0.0001
                  mem_limit_gig: 0.0001
                  pod_seconds: 3600
                  cpu_usage:
                    full_period: 0.0001
                  mem_usage_gig:
                    full_period: 0.0001
                  labels: label_app:missing_non_top
