---
generators:

  - OCPGenerator:
      start_date: last_month
      nodes:
        - node:
          node_name: ocp-node-1
          node_labels: label_node_name:ocp-node-1|label_qe-source:cost_dist_cpu|label_tier:node
          cpu_cores: 15
          memory_gig: 8
          namespaces:
            ocp_prod_dist:
              namespace_labels: label_project_name:ocp_prod_dist|label_tier:project|label_death_note:unmatched_value|label_last_of_us:Ellie
              pods:
                - pod:
                  pod_name: nod
                  cpu_request: 5
                  mem_request_gig: 5
                  cpu_limit: 6
                  mem_limit_gig: 6
                  pod_seconds: 3600
                  cpu_usage:
                    full_period: 4
                  mem_usage_gig:
                    full_period: 4
                  labels: label_app:nod|label_test:weak|label_git:status|label_stack:camp
              volumes:
                - volume:
                  volume_name: pvc-volume_1
                  storage_class: gp2
                  volume_request_gig: 10
                  labels: label_volume:nod
                  volume_claims:
                  - volume_claim:
                    volume_claim_name: data_nod
                    pod_name: nod
                    labels: label_volume:stor_nod|label_test:weak|label_git:status|label_stack:camp|label_storageclass:st
                    capacity_gig: 10
                    volume_claim_usage_gig:
                      full_period: 5
