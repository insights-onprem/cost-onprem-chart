    # This node scheduled a non-AI workload
    # No gpu cost (direct or distributed) must show up in the namespace non-ai-workload
  - OCPGenerator:
      start_date: last_month
      nodes:
        - node:
          node_name: ai_training
          node_labels: label_node_name:ai_training|label_qe-source:cost_dist_cpu|label_tier:node|nvidia_com_gpu_count:2|nvidia_com_gpu_product:L40S|nvidia_com_gpu_present:True|nvidia_com_gpu_replicas:2
          cpu_cores: 20
          memory_gig: 32
          namespaces:
            llm-training:
              namespace_labels: label_project_name:llm_training
              pods:
                - pod:
                  pod_name: llm_training_pod
                  cpu_request: 15
                  mem_request_gig: 7
                  cpu_limit: 18
                  mem_limit_gig: 10
                  pod_seconds: 3000
                  cpu_usage:
                    full_period: 12
                  mem_usage_gig:
                    full_period: 9
                  labels: label_app:ai_training
                  gpus:
                    - gpu_model: L40S
                      gpu_memory_capacity_mib: 81920
                    - gpu_model: L40S
                      gpu_memory_capacity_mib: 81920
            non-ai-workload:
              namespace_labels: label_project_name:non-ai-workload
              pods:
                - pod:
                  pod_name: non_ai_pod
                  cpu_request: 4
                  mem_request_gig: 3
                  cpu_limit: 4
                  mem_limit_gig: 4
                  pod_seconds: 3600
                  cpu_usage:
                    full_period: 2
                  mem_usage_gig:
                    full_period: 3
                  labels: label_app:non_ai
