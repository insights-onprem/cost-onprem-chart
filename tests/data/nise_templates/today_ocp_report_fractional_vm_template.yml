---
generators:

  - OCPGenerator:
      start_date: today
      end_date: "{{ end_date_first_part }}"
      nodes:
        - node:
          node_name: node-tests
          node_labels: label_app:ratetesting
          cpu_cores: 15
          memory_gig: 6
          resource_id: 68956699
          namespaces:
            smoke_test:
              pods:
                - pod:
                  pod_name: node
                  cpu_request: 4
                  mem_request_gig: 3
                  cpu_limit: 5
                  mem_limit_gig: 6
                  pod_seconds: 3600
                  cpu_usage:
                    full_period: 2
                  mem_usage_gig:
                    full_period: 1
                  labels: label_vm_kubevirt_io_name:firstcostmodelvm
              volumes:
                - volume:
                  volume_name: pvc-volume_1
                  storage_class: gp2
                  volume_request_gig: 5
                  volume_claims:
                  - volume_claim:
                    volume_claim_name: node_data
                    pod_name: node
                    capacity_gig: 5
                    volume_claim_usage_gig:
                      full_period: 1
              virtual_machines:
                - virtual_machine:
                  vm_name: fractionalcostmodelvm
                  cpu_cores: 10
                  cpu_limit: 5
                  cpu_request: 4
                  cpu_request_sockets: 3
                  cpu_request_threads: 2
                  cpu_usage:
                    full_period: 1
                  memory_bytes: 2000000000
                  mem_request_gig: 3
                  mem_limit_gig: 4
                  mem_usage_gig:
                    full_period: 2
                  vm_seconds: 3000
                  instance_type: n1.xlarge
                  os: rhel.10.arm64
                  guest_os_arch: aarch64
                  guest_os_name: Red Hat Enterprise Linux
                  guest_os_version: 10.0
                  vol_device: nonrootdisk
                  volume_mode: lowercaseblock
                  capacity_gig: 10
                  volume_claim_name: fractional_vm_pvc_name
                  volume_claim_usage_gig:
                    full_period: 5

