---
generators:
  - OCPGenerator:
      nodes:
        - node:
          node_name: qe-node
          node_labels: label_node:meliodas
          cpu_cores: 20
          memory_gig: 18
          namespaces:
            openshift-qe_test:    # default_project
              namespace_labels: proj_metric_2:flint
              pods:
                - pod:
                  pod_name: qe
                  cpu_request: 3
                  mem_request_gig: 2
                  cpu_limit: 3
                  mem_limit_gig: 5
                  pod_seconds: 3600
                  cpu_usage:
                    full_period: 2
                  mem_usage_gig:
                    full_period: 1
                  labels: label_app:king
                - pod:
                  pod_name: qe_2
                  cpu_request: 1
                  mem_request_gig: 4
                  cpu_limit: 3
                  mem_limit_gig: 6
                  pod_seconds: 3600
                  cpu_usage:
                    full_period: 3
                  mem_usage_gig:
                    full_period: 5
                  labels: label_app:king
              volumes:
                - volume:
                  volume_name: pvc-volume_1
                  storage_class: gp2
                  volume_request_gig: 25
                  labels: label_volume:elizabeth
                  volume_claims:
                  - volume_claim:
                    volume_claim_name: qe_data
