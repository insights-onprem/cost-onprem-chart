---
generators:
  - OCPGenerator:
      start_date: today
      nodes:
        - node:
          node_name: ocp-crazy
          cpu_cores: 5
          memory_gig: 5
          resource_id: 99990000
          namespaces:
            ocp_prod:
              pods:
                - pod:
                  pod_name: crazy
                  cpu_request: 3
                  mem_request_gig: 3
                  cpu_limit: 4
                  mem_limit_gig: 4
                  pod_seconds: 3600
                  cpu_usage:
                    full_period: 2
                  mem_usage_gig:
                    full_period: 2
                  labels: label_app:crazy
              volumes:
                - volume:
                  volume_name: pvc-volume_2
                  storage_class: gp2
                  volume_request_gig: 10
                  labels: label_volume:crazy
                  volume_claims:
                  - volume_claim:
                    volume_claim_name: data_crazy
                    pod_name: crazy
                    labels: label_volume:stor_crazy
                    capacity_gig: 10
                    volume_claim_usage_gig:
                      full_period: 5
