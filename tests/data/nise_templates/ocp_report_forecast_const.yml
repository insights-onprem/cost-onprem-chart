---
generators:
  - OCPGenerator:
      nodes:
        - node:
          node_name: tests-const_forecast
          cpu_cores: 5
          memory_gig: 5
          resource_id: 33332929
          namespaces:
            test_const_forecast:
              pods:
                - pod:
                  pod_name: const_forecast
                  cpu_request: 3
                  mem_request_gig: 3
                  cpu_limit: 4
                  mem_limit_gig: 4
                  pod_seconds: 3600
                  cpu_usage:
                    full_period: 2
                  mem_usage_gig:
                    full_period: 2
                  labels: label_app:const_forecast
              volumes:
                - volume:
                  volume_name: pvc_const_forecast
                  storage_class: gp2
                  volume_request_gig: 10
                  labels: label_volume:const_forecast
                  volume_claims:
                  - volume_claim:
                    volume_claim_name: data_const_forecast
                    pod_name: const_forecast
                    labels: label_volume:stor_const_forecast
                    capacity_gig: 10
                    volume_claim_usage_gig:
                      full_period: 5
