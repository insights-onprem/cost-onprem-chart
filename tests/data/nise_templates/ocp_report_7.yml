---
generators:
  - OCPGenerator:
      start_date: last_month
      nodes:
        - node:
          node_name: ocp-tiers
          cpu_cores: 5
          memory_gig: 5
          resource_id: 11995555
          namespaces:
            ocp_tiers:
              pods:
                - pod:
                  pod_name: tiers
                  cpu_request: 2
                  mem_request_gig: 3
                  cpu_limit: 4
                  mem_limit_gig: 4
                  pod_seconds: 3600
                  cpu_usage:
                    full_period: 3
                  mem_usage_gig:
                    full_period: 2
                  labels: label_app:teirs
              volumes:
                - volume:
                  volume_name: pvc-volume_1
                  storage_class: gp2
                  volume_request_gig: 10
                  labels: label_volume:tiers
                  volume_claims:
                  - volume_claim:
                    volume_claim_name: data_tiers
                    pod_name: tiers
                    labels: label_volume:stor_tiers
                    capacity_gig: 10
                    volume_claim_usage_gig:
                      full_period: 5
