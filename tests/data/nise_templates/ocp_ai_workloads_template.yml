---

generators:

  # Utilization tests (short time periods)
  - OCPGenerator:
      start_date: "{{node_a30_start_date}}"
      end_date: "{{node_a30_end_date}}"
      nodes:
        - node:
          node_name: node_a30
          node_labels: label_node_name:node_a30|label_qe-source:ai_workloads|label_tier:node
          cpu_cores: 5
          memory_gig: 16
          namespaces:
            ns_inference:
              namespace_labels: project_name:ns_inference
              pods:
                - pod:
                  pod_name: inference_pod
                  cpu_request: 15
                  mem_request_gig: 7
                  cpu_limit: 8
                  mem_limit_gig: 10
                  pod_seconds: 3600
                  cpu_usage:
                    full_period: 12
                  mem_usage_gig:
                    full_period: 9
                  labels: label_app:ns_inference
                  gpus:
                    - gpu_model: A30
                      gpu_memory_capacity_mib: 16384
                    - gpu_model: A30
                      gpu_memory_capacity_mib: 16384

