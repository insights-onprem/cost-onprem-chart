---
generators:
  - OCPGenerator:
      start_date: "{{ start_date_1 }}"
      end_date: "{{ end_date_1 }}"
      nodes:
        - node:
          node_name: tests-hotel
          node_labels: label_node:golf
          cpu_cores: 5
          memory_gig: 5
          namespaces:
            test_echo:
              pods:
                - pod:
                  pod_name: echo
                  cpu_request: 5
                  mem_request_gig: 5
                  cpu_limit: 5
                  mem_limit_gig: 5
                  pod_seconds: 3600
                  cpu_usage:
                    full_period: 5
                  mem_usage_gig:
                    full_period: 5
                  labels: label_app:hotel|label_qe:valid
              volumes:
                - volume:
                  volume_name: pvc-volume_8
                  storage_class: gp2
                  volume_request_gig: 5
                  labels: label_volume:hotel
                  volume_claims:
                  - volume_claim:
                    volume_claim_name: data_hotel
                    pod_name: echo
                    labels: label_volume:stor_hotel|label_volqe:stor_golf
                    capacity_gig: 5
                    volume_claim_usage_gig:
                      full_period: 5
