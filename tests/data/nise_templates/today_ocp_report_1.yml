---
generators:
  - OCPGenerator:
      start_date: today
      nodes:
        - node:
          node_name: smoke-tests
          cpu_cores: 20
          memory_gig: 15
          resource_id: 68958844
          namespaces:
            smoke_test:
              pods:
                - pod:
                  pod_name: smoke
                  cpu_request: 7
                  mem_request_gig: 9
                  cpu_limit: 12
                  mem_limit_gig: 10
                  pod_seconds: 3600
                  cpu_usage:
                    full_period: 5
                  mem_usage_gig:
                    full_period: 3
                  labels: label_app:smoking
              volumes:
                - volume:
                  volume_name: pvc-volume_1
                  storage_class: gp2
                  volume_request_gig: 500
                  labels: label_volume:smoking
                  volume_claims:
                  - volume_claim:
                    volume_claim_name: smoke_data
                    pod_name: smoke
                    labels: label_volume:smoking
                    capacity_gig: 500
                    volume_claim_usage_gig:
                      full_period: 100
