---
generators:
  - OCPGenerator:
      start_date: last_month
      end_date: "{{ echo_orig_end }}"
      nodes:
        - node:
          node_name: tests-echo
          node_labels: label_node:asuna
          cpu_cores: 5
          memory_gig: 5
          resource_id: 22225555
          namespaces:
            test_echo:
              pods:
                - pod:
                  pod_name: echoinitial
                  cpu_request: 5
                  mem_request_gig: 5
                  cpu_limit: 5
                  mem_limit_gig: 5
                  pod_seconds: 3600
                  cpu_usage:
                    full_period: 5
                  mem_usage_gig:
                    full_period: 5
                  labels: label_app:echo|label_qe:rock|label_vm_kubevirt_io_name:echovm
              volumes:
                - volume:
                  volume_name: pvc-volume_1
                  storage_class: gp2
                  volume_request_gig: 5
